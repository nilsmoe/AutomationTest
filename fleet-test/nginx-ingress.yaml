# Optional: expose NGINX at nginx.int.cloudshift.no
# Requires: add nginx A record to CoreDNS (Docker/core-dns/int.cloudshift.no.zone)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx
  labels:
    app: nginx
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: le
spec:
  ingressClassName: traefik
  rules:
    - host: nginx.int.cloudshift.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
  tls:
    - hosts:
        - nginx.int.cloudshift.no
